<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Login - SGS Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background: var(--bg-primary);
      color: var(--text-primary);
    }
    .auth-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .auth-card {
      width: 100%;
      max-width: 440px;
      background: var(--bg-card);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-xl);
      padding: 2.5rem;
      backdrop-filter: blur(20px);
      box-shadow: var(--shadow-card);
    }
    .auth-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .auth-icon {
      width: 64px;
      height: 64px;
      background: var(--gradient-main);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin: 0 auto 1.5rem auto;
      box-shadow: var(--shadow-glow-violet);
    }
    .auth-title {
      font-family: 'Outfit', sans-serif;
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
    }
    .auth-toggle {
      display: flex;
      background: rgba(255,255,255,0.05);
      border-radius: var(--radius-md);
      padding: 0.25rem;
      margin-bottom: 2rem;
    }
    .auth-toggle-btn {
      flex: 1;
      text-align: center;
      padding: 0.75rem;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-weight: 600;
      color: var(--text-secondary);
      transition: all 0.3s ease;
    }
    .auth-toggle-btn.active {
      background: var(--gradient-main);
      color: white;
      box-shadow: var(--shadow-glow-violet);
    }
    .auth-form {
      display: none;
    }
    .auth-form.active {
      display: block;
      animation: fadeIn 0.4s ease-out forwards;
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-brand" onclick="window.location.href='index.html'" style="cursor: pointer;">
      <div class="nav-logo">🎓</div>
      SGS Portal
    </div>
    <div class="nav-links">
      <a href="index.html">Home</a>
    </div>
  </nav>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-icon">🎓</div>
        <h1 class="auth-title">Student Portal</h1>
        <p style="color: var(--text-secondary);">Login to access your grievance dashboard.</p>
      </div>

      <div class="auth-toggle">
        <div class="auth-toggle-btn active" id="btnShowLogin" onclick="switchTab('login')">Login</div>
        <div class="auth-toggle-btn" id="btnShowRegister" onclick="switchTab('register')">Register</div>
      </div>

      <!-- LOGIN FORM -->
      <form id="loginForm" class="auth-form active">
        <div class="form-group">
          <label>Enrollment Number</label>
          <input type="text" id="loginEnrollment" class="form-control" required placeholder="e.g. 2310123">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" class="form-control" required placeholder="Enter password">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;" id="loginBtn">Login to Dashboard</button>
      </form>

      <!-- REGISTER FORM -->
      <form id="registerForm" class="auth-form">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="regName" class="form-control" required placeholder="e.g. Arjun Sharma">
        </div>
        <div class="form-group">
          <label>Enrollment Number</label>
          <input type="text" id="regEnrollment" class="form-control" required placeholder="e.g. 2310123">
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="regEmail" class="form-control" required placeholder="you@college.edu">
        </div>
        <div class="form-group">
          <label>Create Password</label>
          <input type="password" id="regPassword" class="form-control" required placeholder="Choose a strong password">
        </div>
        <button type="submit" class="btn btn-secondary" style="width: 100%; margin-top: 1rem;" id="regBtn">Create Account</button>
      </form>

    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>
  <script src="app.js"></script>
  <script>
    // Redirect if already logged in
    if (getLoggedInStudent()) {
      window.location.href = 'student-dashboard.html';
    }

    function switchTab(tab) {
      if (tab === 'login') {
        document.getElementById('loginForm').classList.add('active');
        document.getElementById('registerForm').classList.remove('active');
        document.getElementById('btnShowLogin').classList.add('active');
        document.getElementById('btnShowRegister').classList.remove('active');
      } else {
        document.getElementById('loginForm').classList.remove('active');
        document.getElementById('registerForm').classList.add('active');
        document.getElementById('btnShowLogin').classList.remove('active');
        document.getElementById('btnShowRegister').classList.add('active');
      }
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.textContent = 'Logging in...';

      try {
        const data = await loginStudent({
          enrollment: document.getElementById('loginEnrollment').value,
          password: document.getElementById('loginPassword').value
        });
        localStorage.setItem('sgs_student_session', JSON.stringify(data.student));
        showToast('success', 'Success', 'Logged in successfully!');
        setTimeout(() => {
          window.location.href = 'student-dashboard.html';
        }, 1000);
      } catch (err) {
        showToast('error', 'Login Failed', err.message);
        btn.disabled = false;
        btn.textContent = 'Login to Dashboard';
      }
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('regBtn');
      btn.disabled = true;
      btn.textContent = 'Creating Account...';

      try {
        const data = await registerStudent({
          name: document.getElementById('regName').value,
          enrollment: document.getElementById('regEnrollment').value,
          email: document.getElementById('regEmail').value,
          password: document.getElementById('regPassword').value
        });
        
        // Auto login after register
        const loginData = await loginStudent({
          enrollment: document.getElementById('regEnrollment').value,
          password: document.getElementById('regPassword').value
        });
        localStorage.setItem('sgs_student_session', JSON.stringify(loginData.student));

        showToast('success', 'Account Created!', 'Welcome to the portal.');
        setTimeout(() => {
          window.location.href = 'student-dashboard.html';
        }, 1000);
      } catch (err) {
        showToast('error', 'Registration Failed', err.message);
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
